<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to your Quest Auth account and continue your adventure." />
  <title>Login — Quest Auth</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Floating background shapes -->
  <div class="bg-decor">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <main class="auth-page">
    <div class="auth-card" id="login-card">

      <!-- Header -->
      <div class="auth-header">
        <div class="icon">⚡</div>
        <h1>Welcome Back, Hero!</h1>
        <p>Enter your credentials to continue the quest</p>
      </div>

      <!-- Alert -->
      <div class="alert alert-error" id="alert-error">
        <span>⚠️</span>
        <span id="alert-error-text">Something went wrong.</span>
      </div>
      <div class="alert alert-success" id="alert-success">
        <span>✅</span>
        <span id="alert-success-text">Success!</span>
      </div>

      <!-- Form -->
      <form id="login-form" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label for="email"><span class="label-icon">📧</span> Email</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="hero@quest.com"
              autocomplete="email"
              required
            />
            <span class="input-icon">✉️</span>
          </div>
          <div class="field-error" id="email-error">Please enter your email address.</div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password"><span class="label-icon">🔑</span> Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Your secret key"
              autocomplete="current-password"
              required
            />
            <span class="input-icon">🛡️</span>
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">👁️</button>
          </div>
          <div class="field-error" id="password-error">Please enter your password.</div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary" id="btn-login">
          <span>🏹</span> Enter the Realm
        </button>
      </form>

      <!-- Footer -->
      <div class="form-footer">
        New adventurer? <a href="register.html">Create an account</a>
      </div>
    </div>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
