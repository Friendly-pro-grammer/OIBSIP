<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your account and start your adventure. Join the quest today!" />
  <title>Register — Quest Auth</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Floating background shapes -->
  <div class="bg-decor">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <main class="auth-page">
    <div class="auth-card" id="register-card">

      <!-- Header -->
      <div class="auth-header">
        <div class="icon">🚀</div>
        <h1>Begin Your Quest</h1>
        <p>Create an account to start your adventure</p>
      </div>

      <!-- Alert -->
      <div class="alert alert-error" id="alert-error">
        <span>⚠️</span>
        <span id="alert-error-text">Something went wrong.</span>
      </div>
      <div class="alert alert-success" id="alert-success">
        <span>✅</span>
        <span id="alert-success-text">Account created!</span>
      </div>

      <!-- Form -->
      <form id="register-form" novalidate>
        <!-- Username -->
        <div class="form-group">
          <label for="username"><span class="label-icon">👤</span> Username</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Choose a hero name"
              autocomplete="username"
              required
            />
            <span class="input-icon">🎮</span>
          </div>
          <div class="field-error" id="username-error">Username is required (min 3 characters).</div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email"><span class="label-icon">📧</span> Email</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="hero@quest.com"
              autocomplete="email"
              required
            />
            <span class="input-icon">✉️</span>
          </div>
          <div class="field-error" id="email-error">Please enter a valid email address.</div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password"><span class="label-icon">🔑</span> Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create your secret key"
              autocomplete="new-password"
              required
            />
            <span class="input-icon">🛡️</span>
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">👁️</button>
          </div>
          <div class="password-rules">
            <div class="rule" id="rule-length">
              <span class="rule-icon">⭕</span>
              <span>At least 8 characters</span>
            </div>
            <div class="rule" id="rule-number">
              <span class="rule-icon">⭕</span>
              <span>At least 1 number</span>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary" id="btn-register">
          <span>⚔️</span> Create Account
        </button>
      </form>

      <!-- Footer -->
      <div class="form-footer">
        Already a hero? <a href="login.html">Log in here</a>
      </div>
    </div>
  </main>

  <script src="js/register.js"></script>
</body>
</html>
